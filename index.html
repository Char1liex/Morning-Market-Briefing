<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Morning Briefing — Market Intel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #080c10;
    --surface: #0d1319;
    --surface2: #111820;
    --surface3: #161e28;
    --border: rgba(255,255,255,0.07);
    --border-bright: rgba(255,255,255,0.15);
    --accent: #00e5a0;
    --accent2: #0099ff;
    --warn: #f0b429;
    --text: #e8edf2;
    --text2: #8a97a8;
    --text3: #4a5568;
    --mono: 'IBM Plex Mono', monospace;
    --display: 'Syne', sans-serif;
    --red: #ff4757;
    --green: #00e5a0;
  }
  html { scroll-behavior: smooth; }
  body { background: var(--bg); color: var(--text); font-family: var(--mono); min-height: 100vh; overflow-x: hidden; }
  body::before {
    content: ''; position: fixed; top:0;left:0;right:0;bottom:0;
    background: repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.03) 2px,rgba(0,0,0,0.03) 4px);
    pointer-events: none; z-index: 9999;
  }
  body::after {
    content: ''; position: fixed; top:0;left:0;right:0;bottom:0;
    background-image: linear-gradient(rgba(0,229,160,0.02) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,160,0.02) 1px,transparent 1px);
    background-size: 40px 40px; pointer-events: none; z-index: 0;
  }
  .app { position: relative; z-index: 1; max-width: 960px; margin: 0 auto; padding: 0 24px 80px; }

  /* HEADER */
  .header { padding: 32px 0 24px; border-bottom: 1px solid var(--border); margin-bottom: 28px; display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; }
  .logo { font-family: var(--display); font-size: 11px; font-weight: 600; letter-spacing: 0.25em; text-transform: uppercase; color: var(--accent); margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
  .logo-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); animation: pulse 2s ease infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.4;transform:scale(0.8)} }
  .header-title { font-family: var(--display); font-size: 32px; font-weight: 800; color: var(--text); letter-spacing: -0.02em; line-height: 1; }
  .header-date { font-size: 11px; color: var(--text3); margin-top: 8px; letter-spacing: 0.05em; }
  .market-status { display: flex; align-items: center; gap: 8px; font-size: 11px; color: var(--text2); letter-spacing: 0.05em; padding: 8px 14px; border: 1px solid var(--border); border-radius: 4px; background: var(--surface); white-space: nowrap; }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--red); }
  .status-dot.open { background: var(--green); animation: pulse 2s ease infinite; }

  /* API KEY BANNER */
  .api-banner { background: var(--surface); border: 1px solid rgba(240,180,41,0.3); border-radius: 6px; padding: 16px 20px; margin-bottom: 20px; display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
  .api-banner.set { border-color: rgba(0,229,160,0.3); }
  .api-label { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text3); white-space: nowrap; }
  .api-label.set { color: var(--accent); }
  .api-input-row { display: flex; gap: 8px; flex: 1; min-width: 200px; }
  .api-input { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 4px; padding: 8px 12px; font-family: var(--mono); font-size: 12px; color: var(--text); outline: none; transition: border-color 0.2s; }
  .api-input:focus { border-color: var(--warn); }
  .api-input.set { border-color: rgba(0,229,160,0.4); color: var(--accent); }
  .btn-sm { background: var(--surface2); border: 1px solid var(--border); border-radius: 4px; color: var(--text2); font-family: var(--mono); font-size: 11px; padding: 8px 14px; cursor: pointer; transition: all 0.2s; letter-spacing: 0.05em; white-space: nowrap; }
  .btn-sm:hover { border-color: var(--accent); color: var(--accent); }
  .btn-sm.danger:hover { border-color: var(--red); color: var(--red); }
  .api-hint { font-size: 10px; color: var(--text3); line-height: 1.5; }

  /* CARDS */
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
  @media(max-width:600px){.two-col{grid-template-columns:1fr}}
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 20px; transition: border-color 0.2s; }
  .card:hover { border-color: var(--border-bright); }
  .card-title { font-size: 10px; font-weight: 500; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text3); margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
  .count-badge { font-size: 9px; padding: 2px 6px; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; color: var(--text3); font-weight: 500; letter-spacing: 0.05em; }
  .ticker-tags { display: flex; flex-wrap: wrap; gap: 6px; min-height: 32px; margin-bottom: 12px; }
  .ticker-tag { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 500; padding: 4px 10px; border-radius: 3px; background: var(--surface2); border: 1px solid var(--border); color: var(--text); letter-spacing: 0.05em; transition: border-color 0.15s; }
  .ticker-tag.open-trade { border-color: rgba(240,180,41,0.3); color: var(--warn); background: rgba(240,180,41,0.05); }
  .ticker-tag button { background: none; border: none; cursor: pointer; color: var(--text3); font-size: 13px; line-height: 1; padding: 0; font-family: var(--mono); transition: color 0.15s; }
  .ticker-tag button:hover { color: var(--red); }
  .input-row { display: flex; gap: 8px; }
  .input-row input { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 4px; padding: 8px 12px; font-family: var(--mono); font-size: 12px; color: var(--text); outline: none; transition: border-color 0.2s; text-transform: uppercase; letter-spacing: 0.08em; }
  .input-row input::placeholder { color: var(--text3); text-transform: none; letter-spacing: normal; }
  .input-row input:focus { border-color: var(--accent); }
  .input-row input.warn-focus:focus { border-color: var(--warn); }
  .btn-add { background: var(--surface2); border: 1px solid var(--border); border-radius: 4px; color: var(--text2); font-family: var(--mono); font-size: 18px; padding: 0 14px; cursor: pointer; transition: all 0.2s; line-height: 1; }
  .btn-add:hover { border-color: var(--accent); color: var(--accent); }
  .btn-add.warn:hover { border-color: var(--warn); color: var(--warn); }
  .empty-state { font-size: 11px; color: var(--text3); padding: 4px 0; font-style: italic; }

  /* FOCUS AREAS */
  .focus-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .focus-item { display: flex; align-items: center; gap: 8px; font-size: 11px; color: var(--text2); cursor: pointer; padding: 8px 10px; border-radius: 4px; border: 1px solid transparent; transition: all 0.15s; user-select: none; }
  .focus-item:hover { background: var(--surface2); border-color: var(--border); }
  .focus-item input[type="checkbox"] { display: none; }
  .focus-check { width: 14px; height: 14px; border: 1px solid var(--border-bright); border-radius: 2px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 9px; transition: all 0.15s; }
  .focus-item input:checked ~ .focus-label { color: var(--text); }
  .focus-item input:checked + .focus-check { background: var(--accent); border-color: var(--accent); color: var(--bg); }

  /* RUN BUTTON */
  .run-section { margin-top: 20px; }
  .btn-run { width: 100%; background: transparent; border: 1px solid var(--accent); border-radius: 6px; color: var(--accent); font-family: var(--display); font-size: 14px; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; padding: 18px 32px; cursor: pointer; transition: all 0.2s; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; gap: 12px; }
  .btn-run::before { content: ''; position: absolute; top:0;left:-100%;right:100%;bottom:0; background: rgba(0,229,160,0.08); transition: all 0.3s ease; }
  .btn-run:hover::before { left:0;right:0; }
  .btn-run:hover { box-shadow: 0 0 30px rgba(0,229,160,0.15),inset 0 0 30px rgba(0,229,160,0.05); }
  .btn-run:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-run:disabled::before { display: none; }

  /* OUTPUT */
  .output-section { margin-top: 28px; display: none; }
  .output-section.visible { display: block; }
  .output-card { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
  .output-header { padding: 14px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; background: var(--surface2); }
  .output-header-left { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text3); display: flex; align-items: center; gap: 8px; }
  .output-header-left .ohl-accent { color: var(--accent); }
  .output-body { padding: 24px; font-size: 13px; line-height: 1.9; color: var(--text2); max-height: 70vh; overflow-y: auto; }
  .output-body::-webkit-scrollbar { width: 4px; }
  .output-body::-webkit-scrollbar-track { background: var(--surface); }
  .output-body::-webkit-scrollbar-thumb { background: var(--border-bright); border-radius: 2px; }

  /* Markdown-style rendering */
  .output-body h2 { font-family: var(--display); font-size: 15px; font-weight: 700; color: var(--accent); margin: 24px 0 10px; letter-spacing: 0.03em; border-bottom: 1px solid rgba(0,229,160,0.15); padding-bottom: 8px; }
  .output-body h2:first-child { margin-top: 0; }
  .output-body h3 { font-family: var(--display); font-size: 13px; font-weight: 600; color: var(--text); margin: 16px 0 6px; }
  .output-body p { margin-bottom: 10px; }
  .output-body strong { color: var(--text); font-weight: 600; }
  .output-body em { color: var(--warn); font-style: normal; }
  .output-body ul { margin: 8px 0 12px 16px; }
  .output-body li { margin-bottom: 5px; }
  .output-body .flag-red { color: var(--red); font-weight: 600; }
  .output-body .flag-warn { color: var(--warn); font-weight: 600; }
  .output-body .flag-green { color: var(--green); font-weight: 600; }
  .output-body hr { border: none; border-top: 1px solid var(--border); margin: 20px 0; }
  .output-body table { width: 100%; border-collapse: collapse; margin: 12px 0; font-size: 12px; }
  .output-body th { color: var(--text3); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; padding: 8px 10px; border-bottom: 1px solid var(--border); text-align: left; }
  .output-body td { padding: 8px 10px; border-bottom: 1px solid rgba(255,255,255,0.03); color: var(--text2); }
  .output-body tr:hover td { background: var(--surface2); }

  /* Streaming cursor */
  .cursor { display: inline-block; width: 8px; height: 14px; background: var(--accent); animation: blink 1s step-end infinite; vertical-align: -2px; margin-left: 2px; }
  @keyframes blink { 0%,100%{opacity:1}50%{opacity:0} }

  /* Loading */
  .loading-bar { height: 2px; background: var(--surface2); overflow: hidden; }
  .loading-bar-inner { height: 100%; background: linear-gradient(90deg, transparent, var(--accent), transparent); animation: loading 1.5s ease infinite; width: 40%; }
  @keyframes loading { 0%{transform:translateX(-200%)}100%{transform:translateX(400%)} }

  /* FOOTER */
  .footer { margin-top: 48px; padding-top: 24px; border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; font-size: 10px; color: var(--text3); letter-spacing: 0.08em; }
  .footer-brand { color: var(--accent); font-weight: 500; }

  @media(max-width:500px){ .header-title{font-size:24px} .focus-grid{grid-template-columns:1fr} .api-banner{flex-direction:column} }
</style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <div class="logo"><div class="logo-dot"></div>Market Intel</div>
      <h1 class="header-title">Morning Briefing</h1>
      <div class="header-date" id="header-date"></div>
    </div>
    <div class="market-status"><div class="status-dot" id="status-dot"></div><span id="status-text">Checking...</span></div>
  </header>

  <!-- API Key Banner -->
  <div class="api-banner" id="api-banner">
    <div class="api-label" id="api-label">⚠ API Key Required</div>
    <div class="api-input-row">
      <input type="password" class="api-input" id="api-key-input" placeholder="Paste your Anthropic API key (sk-ant-...)" autocomplete="off" />
      <button class="btn-sm" onclick="saveApiKey()">Save</button>
      <button class="btn-sm danger" onclick="clearApiKey()" id="clear-key-btn" style="display:none">Clear</button>
    </div>
    <div class="api-hint" id="api-hint">Stored only in your browser. Never uploaded anywhere.</div>
  </div>

  <!-- Watchlist + Open Trades -->
  <div class="two-col">
    <div class="card">
      <div class="card-title"><span style="color:var(--accent)">◈</span> Watchlist <span class="count-badge" id="wl-count">0</span></div>
      <div class="ticker-tags" id="wl-tags"></div>
      <div class="input-row">
        <input type="text" id="wl-input" placeholder="Add ticker (e.g. NVDA)" maxlength="6" onkeydown="if(event.key==='Enter')addWL()">
        <button class="btn-add" onclick="addWL()">+</button>
      </div>
    </div>
    <div class="card">
      <div class="card-title"><span style="color:var(--warn)">◈</span> Open Trades <span class="count-badge" id="ot-count">0</span></div>
      <div class="ticker-tags" id="ot-tags"></div>
      <div class="input-row">
        <input type="text" id="ot-input" placeholder="Add ticker (e.g. TSLA)" maxlength="6" class="warn-focus" onkeydown="if(event.key==='Enter')addOT()">
        <button class="btn-add warn" onclick="addOT()">+</button>
      </div>
    </div>
  </div>

  <!-- Focus Areas -->
  <div class="card" style="margin-bottom:0">
    <div class="card-title"><span style="color:var(--accent2)">◈</span> Focus Areas</div>
    <div class="focus-grid">
      <label class="focus-item"><input type="checkbox" id="f1" checked><div class="focus-check">✓</div><span class="focus-label">Macro &amp; Fed</span></label>
      <label class="focus-item"><input type="checkbox" id="f2" checked><div class="focus-check">✓</div><span class="focus-label">Earnings</span></label>
      <label class="focus-item"><input type="checkbox" id="f3" checked><div class="focus-check">✓</div><span class="focus-label">Geopolitical</span></label>
      <label class="focus-item"><input type="checkbox" id="f4" checked><div class="focus-check">✓</div><span class="focus-label">Sector News</span></label>
      <label class="focus-item"><input type="checkbox" id="f5" checked><div class="focus-check">✓</div><span class="focus-label">Economic Calendar</span></label>
      <label class="focus-item"><input type="checkbox" id="f6" checked><div class="focus-check">✓</div><span class="focus-label">Options Flow</span></label>
    </div>
  </div>

  <!-- Run Button -->
  <div class="run-section">
    <button class="btn-run" onclick="runBriefing()" id="run-btn">
      <span>⟳</span> Run Morning Briefing
    </button>
  </div>

  <!-- Output -->
  <div class="output-section" id="output-section">
    <div class="output-card">
      <div class="output-header">
        <div class="output-header-left">Briefing — <span class="ohl-accent" id="output-status">Initializing...</span></div>
        <div style="display:flex;gap:8px">
          <button class="btn-sm" onclick="copyOutput()">Copy</button>
          <button class="btn-sm danger" onclick="clearOutput()">Clear</button>
        </div>
      </div>
      <div class="loading-bar" id="loading-bar" style="display:none"><div class="loading-bar-inner"></div></div>
      <div class="output-body" id="output-body"></div>
    </div>
  </div>

  <footer class="footer">
    <div><span class="footer-brand">Morning Briefing</span> — Day &amp; Swing Options Trading</div>
    <div>NYSE opens 9:30 AM ET</div>
  </footer>
</div>

<script>
  // State
  let wl = JSON.parse(localStorage.getItem('mb_watchlist') || '["SPY","QQQ","TSLA","NVDA","AAPL"]');
  let ot = JSON.parse(localStorage.getItem('mb_opentrades') || '[]');
  let streaming = false;

  function save() {
    localStorage.setItem('mb_watchlist', JSON.stringify(wl));
    localStorage.setItem('mb_opentrades', JSON.stringify(ot));
  }

  // Init
  function init() {
    const now = new Date();
    document.getElementById('header-date').textContent = now.toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
    updateMarketStatus();
    renderWL(); renderOT();
    loadApiKeyUI();
    setInterval(updateMarketStatus, 60000);
  }

  // Market status
  function updateMarketStatus() {
    const et = new Date(new Date().toLocaleString('en-US',{timeZone:'America/New_York'}));
    const day = et.getDay(), mins = et.getHours()*60+et.getMinutes();
    const dot = document.getElementById('status-dot'), txt = document.getElementById('status-text');
    dot.classList.remove('open');
    if (day===0||day===6) { txt.textContent='Market Closed — Weekend'; }
    else if (mins>=570&&mins<960) { dot.classList.add('open'); txt.textContent='Market Open'; }
    else if (mins>=540&&mins<570) { txt.textContent='Pre-Market'; }
    else if (mins>=960&&mins<1080) { txt.textContent='After Hours'; }
    else { txt.textContent='Market Closed'; }
  }

  // API Key
  function loadApiKeyUI() {
    const key = localStorage.getItem('mb_api_key') || '';
    const banner = document.getElementById('api-banner');
    const label = document.getElementById('api-label');
    const input = document.getElementById('api-key-input');
    const hint = document.getElementById('api-hint');
    const clearBtn = document.getElementById('clear-key-btn');
    if (key) {
      banner.classList.add('set');
      label.classList.add('set');
      label.textContent = '✓ API Key Set';
      input.value = '••••••••••••••••••••••••';
      input.classList.add('set');
      input.disabled = true;
      hint.textContent = 'Key stored in browser. Click Clear to remove.';
      clearBtn.style.display = 'inline-block';
    } else {
      banner.classList.remove('set');
      label.classList.remove('set');
      label.textContent = '⚠ API Key Required';
      input.value = '';
      input.classList.remove('set');
      input.disabled = false;
      hint.textContent = 'Stored only in your browser. Never uploaded anywhere.';
      clearBtn.style.display = 'none';
    }
  }

  function saveApiKey() {
    const val = document.getElementById('api-key-input').value.trim();
    if (!val || !val.startsWith('sk-ant-')) { alert('Please paste a valid Anthropic API key (starts with sk-ant-...)'); return; }
    localStorage.setItem('mb_api_key', val);
    loadApiKeyUI();
  }

  function clearApiKey() {
    if (!confirm('Remove saved API key?')) return;
    localStorage.removeItem('mb_api_key');
    loadApiKeyUI();
  }

  // Tickers
  function renderWL() {
    const c = document.getElementById('wl-tags');
    document.getElementById('wl-count').textContent = wl.length;
    c.innerHTML = wl.length ? wl.map(t=>`<span class="ticker-tag">${t}<button onclick="removeWL('${t}')">×</button></span>`).join('') : '<span class="empty-state">No tickers yet</span>';
  }
  function renderOT() {
    const c = document.getElementById('ot-tags');
    document.getElementById('ot-count').textContent = ot.length;
    c.innerHTML = ot.length ? ot.map(t=>`<span class="ticker-tag open-trade">${t}<button onclick="removeOT('${t}')">×</button></span>`).join('') : '<span class="empty-state">No open trades</span>';
  }
  function addWL() {
    const inp=document.getElementById('wl-input'), v=inp.value.trim().toUpperCase().replace(/[^A-Z]/g,'');
    if(v&&!wl.includes(v)&&v.length<=6){wl.push(v);save();renderWL();}
    inp.value='';inp.focus();
  }
  function addOT() {
    const inp=document.getElementById('ot-input'), v=inp.value.trim().toUpperCase().replace(/[^A-Z]/g,'');
    if(v&&!ot.includes(v)&&v.length<=6){ot.push(v);save();renderOT();}
    inp.value='';inp.focus();
  }
  function removeWL(t){wl=wl.filter(x=>x!==t);save();renderWL();}
  function removeOT(t){ot=ot.filter(x=>x!==t);save();renderOT();}

  // Focus
  function getFocus() {
    const map={f1:'macro events, Fed speakers, interest rate news, CPI/PPI/jobs data',f2:'earnings reports before and after market open, beats/misses already reported',f3:'geopolitical events affecting US markets',f4:'sector-level news and rotation signals',f5:'economic calendar releases with consensus estimates and impact level (high/medium/low)',f6:'unusual options activity and key IV events'};
    return Object.keys(map).filter(k=>document.getElementById(k).checked).map(k=>map[k]).join('; ');
  }

  // Simple markdown renderer
  function renderMarkdown(text) {
    return text
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/^### (.+)$/gm,'<h3>$1</h3>')
      .replace(/^## (.+)$/gm,'<h2>$1</h2>')
      .replace(/^# (.+)$/gm,'<h2>$1</h2>')
      .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
      .replace(/\*(.+?)\*/g,'<em>$1</em>')
      .replace(/^---$/gm,'<hr>')
      .replace(/^[\-\*] (.+)$/gm,'<li>$1</li>')
      .replace(/(<li>.*<\/li>)/gs, '<ul>$1</ul>')
      .replace(/🔴/g,'<span class="flag-red">🔴</span>')
      .replace(/⚠️/g,'<span class="flag-warn">⚠️</span>')
      .replace(/🟢/g,'<span class="flag-green">🟢</span>')
      .replace(/🟡/g,'<span class="flag-warn">🟡</span>')
      .replace(/\n\n/g,'</p><p>')
      .replace(/^(?!<[hul]|<p|<hr)(.+)$/gm,'<p>$1</p>');
  }

  // Main run function
  async function runBriefing() {
    if (streaming) return;
    const apiKey = localStorage.getItem('mb_api_key');
    if (!apiKey) { alert('Please enter and save your Anthropic API key first.'); return; }
    if (!wl.length && !ot.length) { alert('Add at least one ticker to your watchlist or open trades.'); return; }

    const today = new Date().toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
    const otStr = ot.length ? ot.join(', ') : 'none';
    const wlStr = wl.length ? wl.join(', ') : 'none';
    const focus = getFocus();

    const prompt = `Run my morning market briefing for ${today}.

Open trades (PRIORITIZE THESE — flag any risk or catalyst immediately): ${otStr}
Watchlist (scanning for setups): ${wlStr}

Search the web and give me a comprehensive pre-market briefing for day trading and swing trading options. Structure it exactly like this:

## 1. Market Snapshot
Pre-market futures (S&P 500, Nasdaq, Dow, Russell 2000), VIX level, overnight sentiment summary.

## 2. Top Market-Moving News
Most impactful headlines covering: ${focus}. For each headline, give brief context on how it affects options positioning.

## 3. Earnings Today
Companies reporting before open and after close. Any major beats/misses already out pre-market.

## 4. Economic Calendar
All data releases today with consensus estimates and impact level (High / Medium / Low).

## 5. Open Trades Alert — PRIORITY
For each of my open positions (${otStr}): any news, catalyst, risk, or IV event I need to know about RIGHT NOW. Flag anything urgent.

## 6. Watchlist Spotlight
Setups and catalysts for: ${wlStr}

## 7. Options Trader's Edge
Key IV events today, major expirations, sector rotations, macro setups worth watching.

## 8. One Thing to Watch
The single most important thing for today's session.

Be concise, specific, and actionable. Use 🔴 for urgent flags, 🟡 for caution, 🟢 for constructive setups.`;

    // UI setup
    streaming = true;
    document.getElementById('run-btn').disabled = true;
    document.getElementById('run-btn').innerHTML = '<span>⟳</span> Running...';
    const outputSection = document.getElementById('output-section');
    const outputBody = document.getElementById('output-body');
    const outputStatus = document.getElementById('output-status');
    const loadingBar = document.getElementById('loading-bar');
    outputSection.classList.add('visible');
    outputBody.innerHTML = '';
    outputStatus.textContent = 'Searching live markets...';
    loadingBar.style.display = 'block';
    outputSection.scrollIntoView({behavior:'smooth',block:'start'});

    let fullText = '';

    try {
      const response = await fetch('https://morning-market-briefing.cpettit01.workers.dev', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': apiKey,
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 4000,
          stream: true,
          tools: [{ type: 'web_search_20250305', name: 'web_search' }],
          messages: [{ role: 'user', content: prompt }]
        })
      });

      if (!response.ok) {
        const err = await response.json();
        throw new Error(err.error?.message || `API error ${response.status}`);
      }

      loadingBar.style.display = 'none';
      outputStatus.textContent = 'Streaming...';
      outputBody.innerHTML = '<span class="cursor"></span>';

      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';
      let searchCount = 0;

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop();

        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          const data = line.slice(6).trim();
          if (data === '[DONE]') continue;
          try {
            const evt = JSON.parse(data);
            if (evt.type === 'content_block_start' && evt.content_block?.type === 'tool_use' && evt.content_block?.name === 'web_search') {
              searchCount++;
              outputStatus.textContent = `Running ${searchCount} web search${searchCount>1?'es':''}...`;
            }
            if (evt.type === 'content_block_delta' && evt.delta?.type === 'text_delta') {
              fullText += evt.delta.text;
              outputBody.innerHTML = renderMarkdown(fullText) + '<span class="cursor"></span>';
              outputBody.scrollTop = outputBody.scrollHeight;
            }
          } catch(e) {}
        }
      }

      // Final render without cursor
      outputBody.innerHTML = renderMarkdown(fullText);
      outputStatus.textContent = `Complete — ${searchCount} search${searchCount!==1?'es':''} run`;

    } catch(err) {
      loadingBar.style.display = 'none';
      outputBody.innerHTML = `<p style="color:var(--red)">Error: ${err.message}</p><p style="color:var(--text3);margin-top:8px;font-size:12px;">Check your API key is valid and has credits at console.anthropic.com</p>`;
      outputStatus.textContent = 'Error';
    }

    streaming = false;
    document.getElementById('run-btn').disabled = false;
    document.getElementById('run-btn').innerHTML = '<span>⟳</span> Run Morning Briefing';
  }

  function copyOutput() {
    const text = document.getElementById('output-body').innerText;
    navigator.clipboard.writeText(text).then(() => {
      const btn = event.target;
      btn.textContent = 'Copied ✓';
      setTimeout(() => btn.textContent = 'Copy', 2000);
    });
  }

  function clearOutput() {
    document.getElementById('output-section').classList.remove('visible');
    document.getElementById('output-body').innerHTML = '';
  }

  init();
</script>
</body>
</html>
